workflows:
  ios-dev:
    name: BRDY iOS Development Build
    max_build_duration: 60
    environment:
      flutter: 3.24.5
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.brdy.brdy01"
        GOLF_API_KEY: "N54DEPJZD2J3CD2BAFRS3F7WLY"
      groups:
        - apple_credentials
      ios_signing:
        distribution_type: development
        bundle_identifier: com.brdy.brdy01
    scripts:
      - name: Get Flutter packages
        script: flutter pub get --no-precompile

      - name: Install CocoaPods
        script: find . -name "Podfile" -execdir pod install \;

      - name: Set up code signing
        script: |
          gem install fastlane --no-document
          keychain initialize
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD=$APP_SPECIFIC_PASSWORD \
          FASTLANE_SESSION="" \
          fastlane sigh \
            --username $APPLE_ID \
            --app_identifier com.brdy.brdy01 \
            --development \
            --force \
            --output_path /tmp/profiles
          keychain add-certificates
          xcode-project use-profiles --path /tmp/profiles/*.mobileprovision

      - name: Build and package IPA
        script: |
          flutter build ios --release \
            --dart-define=GOLF_API_KEY=$GOLF_API_KEY
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
