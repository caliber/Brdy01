workflows:
  ios-dev:
    name: BRDY iOS Development Build
    max_build_duration: 60
    environment:
      flutter: 3.24.5
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.brdy.brdy01"
      groups:
        - apple_credentials
    scripts:
      - name: Get Flutter packages
        script: flutter pub get --no-precompile

      - name: Install CocoaPods
        script: find . -name "Podfile" -execdir pod install \;

      - name: Build iOS (no codesign)
        script: |
          flutter build ios --release --no-codesign \
            --dart-define=GOLF_API_KEY=$GOLF_API_KEY

      - name: Package IPA
        script: |
          mkdir -p build/ios/ipa
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../ipa/brdy.ipa Payload

    artifacts:
      - build/ios/ipa/*.ipa
      - flutter_drive.log
