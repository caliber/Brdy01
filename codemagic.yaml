workflows:
  ios-dev:
    name: BRDY iOS Development Build
    max_build_duration: 60
    environment:
      flutter: 3.24.5
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.brdy.brdy01"
        GOLF_API_KEY: "N54DEPJZD2J3CD2BAFRS3F7WLY"
      groups:
        - apple_credentials
      ios_signing:
        distribution_type: development
        bundle_identifier: com.brdy.brdy01
    scripts:
      - name: Get Flutter packages
        script: flutter pub get --no-precompile

      - name: Install CocoaPods
        script: find . -name "Podfile" -execdir pod install \;

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect devices create "BRDY Dev iPhone" \
            --udid 00008110001630522120401E \
            --platform IOS \
            --apple-id $APPLE_ID \
            --password $APP_SPECIFIC_PASSWORD || true
          app-store-connect fetch-signing-files \
            com.brdy.brdy01 \
            --type IOS_APP_DEVELOPMENT \
            --apple-id $APPLE_ID \
            --password $APP_SPECIFIC_PASSWORD \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build iOS
        script: |
          flutter build ios --release \
            --dart-define=GOLF_API_KEY=$GOLF_API_KEY

      - name: Package IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
